<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Remote Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; margin: 0; overflow-x: hidden; }
        .container { padding: 10px; }
        #live-view { 
            border: 1px solid #0f0; 
            width: 100%; 
            max-width: 854px; 
            cursor: crosshair;
            background: #111;
        }
        .status { font-size: 12px; color: #666; margin-bottom: 5px; }
        .controls { margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h3>FIRESTORE BASE64 STREAM</h3>
        <div class="status" id="stat">Connecting to Firestore...</div>
        
        <img id="live-view" src="" alt="Waiting for Frame..." onclick="sendClick(event)">
        
        <div class="controls">
            <small>Click on image to control PC</small>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBcL0G8b7Yt_Ahk29cUaTTfp6Uf4QgNfTI",
            authDomain: "smsyy-f7bb7.firebaseapp.com",
            projectId: "smsyy-f7bb7",
            storageBucket: "smsyy-f7bb7.firebasestorage.app",
            messagingSenderId: "199149027655",
            appId: "1:199149027655:web:2d9e70e7dff7abc293cc62"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.signInAnonymously().then(() => {
            document.getElementById('stat').innerText = "Logged in. Waiting for PC...";
        });

        // Listen for Base64 Data in Firestore
        db.collection("status").doc("view").onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.img_data) {
                    // Direct Base64 rendering
                    document.getElementById('live-view').src = "data:image/jpeg;base64," + data.img_data;
                    document.getElementById('stat').innerText = "Live: " + new Date().toLocaleTimeString();
                }
            }
        });

        function sendClick(e) {
            const img = document.getElementById('live-view');
            const rect = img.getBoundingClientRect();
            
            // Map click to 854x480 coordinate space
            const x = Math.round((e.clientX - rect.left) * (854 / rect.width));
            const y = Math.round((e.clientY - rect.top) * (480 / rect.height));

            db.collection("remote_clicks").doc("latest").set({
                x: x,
                y: y,
                time: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => console.log("Click registered"));
        }
    </script>
</body>
</html>
