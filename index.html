<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Remote Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase App and Database SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 border-b border-slate-700 pb-4">
            <h1 class="text-3xl font-bold text-blue-400">Remote Browser Dashboard</h1>
            <p class="text-slate-400">Control your Python controller.py script from here.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Control Panel -->
            <div class="bg-slate-800 p-6 rounded-xl shadow-lg border border-slate-700">
                <h2 class="text-xl font-semibold mb-4 flex items-center">
                    <span class="mr-2">🎮</span> Send Commands
                </h2>
                
                <!-- Navigation -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-slate-400 mb-1">Target URL</label>
                    <div class="flex gap-2">
                        <input type="text" id="urlInput" placeholder="https://google.com" class="bg-slate-700 border border-slate-600 rounded px-3 py-2 w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <button onclick="sendCommand('navigate')" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded font-medium transition">Go</button>
                    </div>
                </div>

                <!-- Typing -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-slate-400 mb-1">Type Text</label>
                    <div class="flex gap-2">
                        <input type="text" id="typeInput" placeholder="Enter text to type..." class="bg-slate-700 border border-slate-600 rounded px-3 py-2 w-full focus:outline-none focus:ring-2 focus:ring-green-500">
                        <button onclick="sendCommand('type')" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded font-medium transition">Type</button>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="sendCommand('screenshot')" class="bg-purple-600 hover:bg-purple-700 p-4 rounded-lg font-bold flex flex-col items-center">
                        <span class="text-2xl mb-1">📸</span> Capture Screen
                    </button>
                    <button onclick="clearStatus()" class="bg-slate-700 hover:bg-slate-600 p-4 rounded-lg font-bold flex flex-col items-center">
                        <span class="text-2xl mb-1">🧹</span> Clear Logs
                    </button>
                </div>
            </div>

            <!-- Status & Logs -->
            <div class="bg-slate-800 p-6 rounded-xl shadow-lg border border-slate-700">
                <h2 class="text-xl font-semibold mb-4 flex items-center">
                    <span class="mr-2">📡</span> Live Status
                </h2>
                
                <div id="statusContainer" class="space-y-4">
                    <div class="p-3 bg-slate-900 rounded border-l-4 border-blue-500">
                        <p class="text-xs text-slate-500 uppercase font-bold">Current Status</p>
                        <p id="currentStatus" class="text-lg font-mono text-blue-300">Waiting for updates...</p>
                    </div>
                    
                    <div class="p-3 bg-slate-900 rounded border-l-4 border-slate-500">
                        <p class="text-xs text-slate-500 uppercase font-bold">Last Action</p>
                        <p id="lastAction" class="text-sm font-mono">-</p>
                    </div>

                    <div class="p-3 bg-slate-900 rounded border-l-4 border-slate-500">
                        <p class="text-xs text-slate-500 uppercase font-bold">Timestamp</p>
                        <p id="lastTime" class="text-sm font-mono text-slate-400">N/A</p>
                    </div>
                </div>

                <div id="errorBox" class="mt-4 p-3 bg-red-900/30 border border-red-900 rounded text-red-200 text-sm hidden">
                    <strong>Error:</strong> <span id="errorText"></span>
                </div>
            </div>

        </div>

        <footer class="mt-8 text-center text-slate-500 text-sm">
            Connected to: <span class="font-mono text-slate-400">smsyy-f7bb7</span>
        </footer>
    </div>

    <script>
        // Firebase Config (Must match your controller.py)
        const firebaseConfig = {
            databaseURL: "https://smsyy-f7bb7-default-rtdb.firebaseio.com"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Send Command Function
        function sendCommand(action) {
            const url = document.getElementById('urlInput').value;
            const typeText = document.getElementById('typeInput').value;
            
            const taskData = {
                action: action,
                url: url || "",
                typeText: typeText || "",
                timestamp: Date.now()
            };

            // Firebase database update
            database.ref('remote_control/task').set(taskData)
                .then(() => {
                    console.log("Command sent:", action);
                    // Temporarily show sending status
                    document.getElementById('currentStatus').innerText = "Sending " + action + "...";
                })
                .catch((error) => {
                    showError(error.message);
                });
        }

        // Listen for Status Updates from Python Script
        database.ref('remote_control/status').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('currentStatus').innerText = data.status.toUpperCase();
                document.getElementById('lastAction').innerText = data.last_action || "-";
                document.getElementById('lastTime').innerText = data.time || "N/A";
                
                // Visual feedback based on status
                const statusBox = document.getElementById('currentStatus').parentElement;
                if (data.status === 'completed') {
                    statusBox.classList.replace('border-blue-500', 'border-green-500');
                    statusBox.classList.replace('border-red-500', 'border-green-500');
                    document.getElementById('errorBox').classList.add('hidden');
                } else if (data.status === 'failed') {
                    statusBox.classList.replace('border-blue-500', 'border-red-500');
                    statusBox.classList.replace('border-green-500', 'border-red-500');
                    showError(data.error || "Unknown script error");
                }
            }
        });

        function showError(msg) {
            const errorBox = document.getElementById('errorBox');
            document.getElementById('errorText').innerText = msg;
            errorBox.classList.remove('hidden');
        }

        function clearStatus() {
            database.ref('remote_control/status').set({ status: 'idle', time: new Date().toISOString() });
            database.ref('remote_control/task').set({});
            document.getElementById('urlInput').value = "";
            document.getElementById('typeInput').value = "";
        }
    </script>
</body>
</html>
