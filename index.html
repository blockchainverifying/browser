<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Remote Control Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        .stream-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; }
        #liveStream { width: 100%; height: 100%; object-fit: contain; }
        .log-container::-webkit-scrollbar { width: 4px; }
        .log-container::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <div class="max-w-7xl mx-auto p-4 lg:p-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-3xl font-extrabold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                    Stealth Commander
                </h1>
                <p class="text-slate-500 text-sm mt-1">Remote Headless Browser Management & Live Feed</p>
            </div>
            <div class="flex items-center gap-3">
                <div id="statusIndicator" class="flex items-center gap-2 px-4 py-2 bg-slate-800 rounded-full border border-slate-700">
                    <span class="relative flex h-3 w-3">
                        <span id="pingPulse" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                        <span id="pingDot" class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                    </span>
                    <span id="statusText" class="text-xs font-bold uppercase tracking-widest text-slate-400">Offline</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            
            <!-- Main Viewport (Stream) -->
            <div class="lg:col-span-3 space-y-6">
                <div class="stream-container rounded-2xl border border-slate-700 shadow-2xl group">
                    <img id="liveStream" src="https://via.placeholder.com/1280x720/0f172a/94a3b8?text=Connecting+to+Remote+Service..." alt="Live Feed">
                    
                    <!-- Overlay Info -->
                    <div class="absolute top-4 left-4 flex items-center gap-2">
                        <span class="bg-red-600 text-white px-2 py-0.5 rounded text-[10px] font-black uppercase shadow-lg">Live</span>
                        <span id="resBadge" class="bg-slate-900/80 backdrop-blur-md text-slate-300 px-2 py-0.5 rounded text-[10px] border border-slate-700">1280x720</span>
                    </div>

                    <div class="absolute bottom-4 right-4">
                        <p id="streamTime" class="text-[10px] font-mono text-slate-400 bg-black/50 px-2 py-1 rounded backdrop-blur-sm">--:--:--</p>
                    </div>
                </div>
                
                <!-- Quick Actions -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <button onclick="sendCommand('click')" class="flex flex-col items-center justify-center p-4 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl transition-all active:scale-95">
                        <span class="text-blue-400 mb-1">🖱️</span>
                        <span class="text-xs font-semibold">Center Click</span>
                    </button>
                    <button onclick="sendCommand('screenshot')" class="flex flex-col items-center justify-center p-4 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl transition-all active:scale-95">
                        <span class="text-emerald-400 mb-1">📸</span>
                        <span class="text-xs font-semibold">Take Shot</span>
                    </button>
                    <button onclick="window.location.reload()" class="flex flex-col items-center justify-center p-4 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl transition-all active:scale-95">
                        <span class="text-amber-400 mb-1">🔄</span>
                        <span class="text-xs font-semibold">Refresh UI</span>
                    </button>
                    <button onclick="clearLogs()" class="flex flex-col items-center justify-center p-4 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl transition-all active:scale-95">
                        <span class="text-rose-400 mb-1">🧹</span>
                        <span class="text-xs font-semibold">Clear Logs</span>
                    </button>
                </div>
            </div>

            <!-- Sidebar Controls -->
            <div class="space-y-6">
                <!-- Navigation -->
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-3">Target Address</label>
                    <div class="flex flex-col gap-3">
                        <input type="text" id="urlInput" placeholder="https://www.google.com" 
                            class="bg-slate-900 border border-slate-700 rounded-lg p-3 w-full text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        <button onclick="sendCommand('navigate')" 
                            class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-lg font-bold shadow-lg shadow-blue-900/20 transition-all active:translate-y-0.5">
                            Navigate
                        </button>
                    </div>
                </div>

                <!-- Text Injection -->
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-3">Key Injection</label>
                    <div class="flex flex-col gap-3">
                        <textarea id="typeInput" rows="3" placeholder="Enter text to type..." 
                            class="bg-slate-900 border border-slate-700 rounded-lg p-3 w-full text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all resize-none"></textarea>
                        <button onclick="sendCommand('type')" 
                            class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-lg font-bold shadow-lg shadow-emerald-900/20 transition-all active:translate-y-0.5">
                            Type Text
                        </button>
                    </div>
                </div>

                <!-- Log Console -->
                <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800">
                    <h3 class="text-[10px] font-black text-slate-600 uppercase mb-3 flex justify-between">
                        <span>Terminal Logs</span>
                        <span id="logCount">0 events</span>
                    </h3>
                    <div id="logBox" class="log-container text-[10px] font-mono h-48 overflow-y-auto space-y-2 text-slate-500">
                        <div class="text-blue-500">> System Ready...</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Firebase initialization (Matching your setup)
        const firebaseConfig = { databaseURL: "https://smsyy-f7bb7-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let logCounter = 0;
        let lastStreamTime = Date.now();

        // 1. Sync Live Stream from Firebase
        database.ref('remote_control/stream').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.image) {
                document.getElementById('liveStream').src = data.image;
                
                // Update time display
                if (data.timestamp) {
                    const timeStr = new Date(data.timestamp).toLocaleTimeString();
                    document.getElementById('streamTime').innerText = `Sync: ${timeStr}`;
                }
                
                lastStreamTime = Date.now();
                setOnline(true);
            }
        });

        // 2. Sync Execution Status Logs
        database.ref('remote_control/status').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const statusColor = data.status === 'completed' ? 'text-emerald-400' : 'text-rose-400';
                addLog(`<span class="text-slate-300">[${data.last_action}]</span> <span class="${statusColor}">${data.status}</span>`);
            }
        });

        // 3. Heartbeat Check (If stream stops for 10s, show offline)
        setInterval(() => {
            if (Date.now() - lastStreamTime > 10000) {
                setOnline(false);
            }
        }, 5000);

        function sendCommand(action) {
            const url = document.getElementById('urlInput').value;
            const text = document.getElementById('typeInput').value;
            
            database.ref('remote_control/task').set({
                action: action,
                url: url,
                typeText: text,
                timestamp: Date.now()
            });
            
            addLog(`Command issued: <b class="text-blue-400">${action}</b>`);
        }

        function addLog(html) {
            const box = document.getElementById('logBox');
            const entry = document.createElement('div');
            const time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            entry.innerHTML = `<span class="text-slate-700">${time}</span> ${html}`;
            box.appendChild(entry);
            box.scrollTop = box.scrollHeight;
            
            logCounter++;
            document.getElementById('logCount').innerText = `${logCounter} events`;
        }

        function clearLogs() {
            document.getElementById('logBox').innerHTML = '<div class="text-blue-500">> Console Cleared...</div>';
            logCounter = 0;
            document.getElementById('logCount').innerText = `0 events`;
        }

        function setOnline(isOnline) {
            const badge = document.getElementById('statusText');
            const dot = document.getElementById('pingDot');
            const pulse = document.getElementById('pingPulse');
            
            if (isOnline) {
                badge.innerText = "Online";
                badge.className = "text-xs font-bold uppercase tracking-widest text-emerald-400";
                dot.className = "relative inline-flex rounded-full h-3 w-3 bg-emerald-500";
                pulse.className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75";
            } else {
                badge.innerText = "Offline";
                badge.className = "text-xs font-bold uppercase tracking-widest text-slate-400";
                dot.className = "relative inline-flex rounded-full h-3 w-3 bg-red-500";
                pulse.className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75";
            }
        }
    </script>
</body>
</html>
