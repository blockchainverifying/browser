<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Remote Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
        body { 
            background: #0b0b0b; 
            color: #00ff41; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container { 
            padding: 20px; 
            width: 100%;
            max-width: 900px;
        }
        
        .header {
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ff41;
        }

        .viewport-wrapper {
            position: relative; 
            display: inline-block; 
            border: 2px solid #00ff41; 
            background: #000;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            border-radius: 8px;
            overflow: hidden;
        }
        
        #live-view { 
            width: 100%; 
            max-width: 854px; 
            cursor: crosshair; 
            display: block; 
            min-height: 480px;
        }

        .status-bar { 
            font-size: 14px; 
            margin-bottom: 15px; 
            padding: 8px;
            background: rgba(0, 255, 65, 0.1);
            border-radius: 4px;
            width: 100%;
        }

        .controls-panel {
            margin-top: 20px; 
            padding: 20px; 
            background: #161616;
            border-radius: 12px;
            border: 1px solid #333;
            width: 100%;
            box-sizing: border-box;
        }

        .input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .kb-input { 
            background: #000; 
            border: 1px solid #444; 
            color: #00ff41; 
            padding: 12px 15px; 
            flex-grow: 1;
            font-size: 16px; 
            outline: none;
            border-radius: 6px;
            transition: border 0.3s;
        }

        .kb-input:focus {
            border-color: #00ff41;
        }

        .btn { 
            background: #222; 
            border: 1px solid #00ff41; 
            color: #00ff41; 
            padding: 10px 20px; 
            cursor: pointer; 
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .btn:hover { 
            background: #00ff41; 
            color: #000; 
            box-shadow: 0 0 10px #00ff41;
        }

        .btn:active {
            transform: translateY(2px);
        }

        .special-keys { 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            flex-wrap: wrap;
        }

        .btn-orange {
            border-color: #ff9f00;
            color: #ff9f00;
        }

        .btn-orange:hover {
            background: #ff9f00;
            color: #000;
            box-shadow: 0 0 10px #ff9f00;
        }

        .footer-note {
            margin-top: 15px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="header">WEB CONSOLE v2.0</h2>
        
        <div class="status-bar" id="stat">Sytem Booting...</div>

        <div class="viewport-wrapper">
            <img id="live-view" src="" alt="WAITING FOR STREAM..." onclick="sendClick(event)">
        </div>

        <div class="controls-panel">
            <div class="special-keys">
                <button class="btn btn-orange" onclick="sendKey('enter', 'special')">ENTER ⏎</button>
                <button class="btn btn-orange" onclick="sendKey('backspace', 'special')">BACKSPACE ⌫</button>
                <button class="btn btn-orange" onclick="sendKey('tab', 'special')">TAB ⇥</button>
                <button class="btn" onclick="location.reload()">REFRESH UI ↻</button>
            </div>

            <div class="input-group">
                <input type="text" id="typer" class="kb-input" placeholder="Yahan type karein..." onkeypress="handleKey(event)">
                <button class="btn" onclick="sendTyping()">SEND TEXT</button>
            </div>
            
            <p class="footer-note">Note: Screen par click karne se target PC par click hoga.</p>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBcL0G8b7Yt_Ahk29cUaTTfp6Uf4QgNfTI",
            authDomain: "smsyy-f7bb7.firebaseapp.com",
            projectId: "smsyy-f7bb7",
            storageBucket: "smsyy-f7bb7.firebasestorage.app",
            messagingSenderId: "199149027655",
            appId: "1:199149027655:web:2d9e70e7dff7abc293cc62"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Sign in anonymously
        auth.signInAnonymously().then(() => {
            document.getElementById('stat').innerText = "CONNECTED: Stream ka intezar hai...";
        }).catch(e => {
            document.getElementById('stat').innerText = "AUTH ERROR: Settings check karein.";
        });

        // Live Stream Listener
        db.collection("status").doc("view").onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.img_data) {
                    document.getElementById('live-view').src = "data:image/jpeg;base64," + data.img_data;
                    document.getElementById('stat').innerText = "LIVE | Last Sync: " + new Date().toLocaleTimeString();
                }
            }
        });

        // Click Handler
        function sendClick(e) {
            const img = document.getElementById('live-view');
            const rect = img.getBoundingClientRect();
            
            // Map click to 854x480 logic space
            const x = Math.round((e.clientX - rect.left) * (854 / rect.width));
            const y = Math.round((e.clientY - rect.top) * (480 / rect.height));

            db.collection("remote_clicks").doc("latest").set({
                x: x,
                y: y,
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        // Keyboard Key Handler (Special/Text)
        function sendKey(key, type) {
            db.collection("remote_keys").doc("latest").set({
                key: key,
                type: type,
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        // Typing Action
        function sendTyping() {
            const input = document.getElementById('typer');
            if (input.value) {
                sendKey(input.value, 'text');
                input.value = "";
                input.focus();
            }
        }

        // Handle Enter key on input field
        function handleKey(e) {
            if (e.key === 'Enter') {
                sendTyping();
            }
        }
    </script>
</body>
</html>
