<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remote Control Panel v5</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c10;--panel:#0d1117;--border:#1a2a1a;
  --green:#00ff88;--green2:#00cc66;--red:#ff3355;
  --yellow:#ffcc00;--dim:#2a3a2a;--text:#c8ffd4;--muted:#4a6650;
  --glow:0 0 14px #00ff8866;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Rajdhani',sans-serif;min-height:100vh;
}
body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,100,.01) 2px,rgba(0,255,100,.01) 4px);
  pointer-events:none;z-index:9999;
}

.wrap{max-width:1260px;margin:0 auto;padding:16px;}

/* HEADER */
header{
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:16px;
}
.logo{font-family:'Share Tech Mono',monospace;font-size:.95rem;color:var(--green);letter-spacing:3px;}
.logo em{color:var(--muted);font-style:normal;}
.badges{display:flex;gap:8px;}
.badge{
  display:flex;align-items:center;gap:6px;
  font-family:'Share Tech Mono',monospace;font-size:.65rem;
  color:var(--muted);background:#0a160a;
  border:1px solid var(--dim);padding:4px 11px;border-radius:2px;
}
.badge .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);}
.badge.live .dot{background:var(--green);box-shadow:var(--glow);animation:pulse 1.4s infinite;}
.badge.live{color:var(--green);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* MAIN LAYOUT */
.layout{display:grid;grid-template-columns:1fr 290px;gap:14px;align-items:start;}

/* ── VIEWER ── */
.viewer{background:var(--panel);border:1px solid var(--border);border-radius:3px;overflow:hidden;}

.vtop{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;background:#060e08;
  border-bottom:1px solid var(--border);flex-wrap:wrap;
}
.lbl{font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.lbl.flex-grow{flex:1;}

/* FPS bar */
.fps-rail{height:2px;background:var(--border);}
.fps-fill{height:100%;background:var(--green);width:0;transition:width .6s;box-shadow:var(--glow);}

/* Screen */
.vbody{
  position:relative;background:#000;
  display:flex;align-items:center;justify-content:center;
  min-height:380px;overflow:hidden;
}
#scr{
  display:none;width:100%;height:auto;
  cursor:crosshair;user-select:none;-webkit-user-drag:none;
  image-rendering:high-quality;
}
.cring{
  position:absolute;width:16px;height:16px;
  border:2px solid var(--green);border-radius:50%;
  pointer-events:none;transform:translate(-50%,-50%);
  box-shadow:var(--glow);display:none;
  transition:left .03s linear,top .03s linear;
}
.no-scr{
  text-align:center;padding:56px 24px;
  font-family:'Share Tech Mono',monospace;color:var(--muted);font-size:.8rem;
}
.blink{animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:0}}

/* KB bar */
.kbbar{
  display:flex;gap:8px;padding:9px 14px;
  background:#060e08;border-top:1px solid var(--border);
}
.kbbar input{
  flex:1;background:#060e08;border:1px solid var(--dim);
  color:var(--text);font-family:'Rajdhani',sans-serif;font-size:.95rem;
  padding:7px 12px;border-radius:2px;outline:none;
}
.kbbar input:focus{border-color:var(--green);}

/* ── SIDE ── */
.side{display:flex;flex-direction:column;gap:12px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.ch{
  padding:8px 14px;background:#060e08;
  border-bottom:1px solid var(--border);
  font-size:.6rem;letter-spacing:3px;
  text-transform:uppercase;color:var(--muted);
}
.ch.row{display:flex;align-items:center;justify-content:space-between;}

/* Stats */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);}
.stat{background:var(--panel);padding:11px 13px;}
.sl{font-size:.58rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.sv{font-family:'Share Tech Mono',monospace;font-size:1.4rem;color:var(--green);text-shadow:var(--glow);}

/* Device list */
#devlist{max-height:200px;overflow-y:auto;}
#devlist::-webkit-scrollbar{width:3px;}
#devlist::-webkit-scrollbar-thumb{background:var(--dim);}
.di{
  padding:8px 13px;border-bottom:1px solid #0f1a0f;
  display:flex;align-items:center;gap:7px;cursor:pointer;transition:.12s;
}
.di:hover{background:#0a160a;}
.di:last-child{border-bottom:none;}
.di.active{background:#001a0a;border-left:2px solid var(--green);}
.ddot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.ddot.on{background:var(--green);box-shadow:0 0 6px #00ff8899;}
.dinfo{flex:1;min-width:0;}
.dname{font-family:'Share Tech Mono',monospace;font-size:.76rem;color:var(--green);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dmeta{font-size:.6rem;color:var(--muted);margin-top:1px;}
.dlk{font-size:.6rem;padding:2px 6px;border-radius:2px;white-space:nowrap;}
.dlk.lk{background:#200005;color:var(--red);border:1px solid #440011;}
.dlk.ok{background:#001a0a;color:var(--green2);border:1px solid var(--dim);}

/* Lock control */
.qa{padding:10px 12px;display:flex;flex-direction:column;gap:7px;}
.qa input{
  background:#060e08;border:1px solid var(--dim);color:var(--text);
  font-family:'Rajdhani',sans-serif;font-size:.88rem;
  padding:7px 10px;border-radius:2px;outline:none;width:100%;
}
.qa input:focus{border-color:var(--green);}
.row2{display:flex;gap:7px;}
.row2 .btn{flex:1;}

/* Shortcuts */
.skgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:10px;}

/* Buttons */
.btn{
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.72rem;
  letter-spacing:1px;text-transform:uppercase;
  padding:7px 10px;border-radius:2px;border:none;cursor:pointer;transition:all .12s;
}
.br{background:transparent;border:1px solid var(--red);color:var(--red);}
.br:hover{background:var(--red);color:#000;box-shadow:0 0 10px #ff335550;}
.bg{background:transparent;border:1px solid var(--green);color:var(--green);}
.bg:hover{background:var(--green);color:#000;box-shadow:var(--glow);}
.bsr{background:var(--red);color:#fff;border:1px solid var(--red);}
.bsr:hover{background:#c00;}
.bsg{background:var(--green2);color:#000;border:1px solid var(--green2);}
.bsg:hover{background:var(--green);}
.btn.sm{padding:5px 8px;font-size:.68rem;}

/* mode btn */
.mb{
  padding:4px 9px;font-size:.65rem;letter-spacing:1px;border-radius:2px;
  border:1px solid var(--dim);background:transparent;color:var(--muted);
  cursor:pointer;font-family:'Rajdhani',sans-serif;text-transform:uppercase;
}
.mb.on{border-color:var(--green);color:var(--green);background:#001a0a;}

/* Log */
#log{height:130px;overflow-y:auto;padding:7px 12px;
  font-family:'Share Tech Mono',monospace;font-size:.65rem;line-height:1.9;}
#log::-webkit-scrollbar{width:3px;}
#log::-webkit-scrollbar-thumb{background:var(--dim);}
.le{display:flex;gap:8px;}
.lt{color:var(--muted);min-width:54px;flex-shrink:0;}
.lm.ok{color:var(--green);}
.lm.er{color:var(--red);}
.lm.in{color:var(--yellow);}

/* Toast */
#toast{
  position:fixed;bottom:16px;right:16px;
  background:var(--panel);border:1px solid var(--green);
  color:var(--green);font-family:'Share Tech Mono',monospace;
  font-size:.7rem;padding:9px 16px;border-radius:3px;
  transform:translateY(12px);opacity:0;transition:all .22s;
  z-index:10000;box-shadow:var(--glow);
}
#toast.show{opacity:1;transform:translateY(0);}
#toast.err{border-color:var(--red);color:var(--red);}

@media(max-width:820px){.layout{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="logo">RCP<em>//</em>Remote Control Panel <em>v5</em></div>
  <div class="badges">
    <div class="badge" id="fbb"><div class="dot"></div><span id="fbt">FIREBASE...</span></div>
    <div class="badge" id="stb"><div class="dot"></div><span id="stt">NO STREAM</span></div>
  </div>
</header>

<div class="layout">

  <!-- VIEWER -->
  <div class="viewer">

    <div class="vtop">
      <span class="lbl flex-grow">// Live Screen  <span id="dev-watching" style="color:var(--green)"></span></span>
      <button class="mb on" id="mb-move"  onclick="setMode('move')">Move</button>
      <button class="mb"    id="mb-click" onclick="setMode('click')">Click</button>
      <button class="mb"    id="mb-drag"  onclick="setMode('drag')">Drag</button>
      <span style="font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--muted)" id="fpslbl">— fps</span>
    </div>

    <div class="fps-rail"><div class="fps-fill" id="fpsfill"></div></div>

    <div class="vbody" id="vbody">
      <div class="no-scr" id="nomsg">
        <div style="font-size:2.8rem;margin-bottom:12px;opacity:.4">🖥️</div>
        <span class="blink">█</span>&nbsp;Device select karo screen dekhne ke liye<br>
        <span style="font-size:.7rem;margin-top:8px;display:block">Left panel → Devices list se click karo</span>
      </div>
      <img id="scr" draggable="false"/>
      <div class="cring" id="cring"></div>
    </div>

    <div class="kbbar">
      <input id="kb" placeholder="Text type karo aur Enter dabao (target PC pe type hoga)"/>
      <button class="btn bg sm" onclick="sendText()">Send</button>
    </div>
  </div>

  <!-- SIDE -->
  <div class="side">

    <!-- Stats -->
    <div class="card">
      <div class="ch">// Stats</div>
      <div class="sgrid">
        <div class="stat"><div class="sl">Total</div><div class="sv" id="s-tot">0</div></div>
        <div class="stat"><div class="sl">Online</div><div class="sv" id="s-on">0</div></div>
        <div class="stat"><div class="sl">Locked</div><div class="sv" id="s-lk" style="color:var(--red)">0</div></div>
        <div class="stat"><div class="sl">Stream</div><div class="sv" id="s-fps" style="font-size:.9rem;padding-top:5px">—</div></div>
      </div>
    </div>

    <!-- Devices -->
    <div class="card">
      <div class="ch">// Devices  <span style="font-size:.55rem;font-weight:400;letter-spacing:1px">(CLICK = SCREEN DEKHO)</span></div>
      <div id="devlist">
        <div style="padding:18px;text-align:center;color:var(--muted);font-size:.7rem;font-family:'Share Tech Mono'">Loading...</div>
      </div>
    </div>

    <!-- Lock Control -->
    <div class="card">
      <div class="ch">// Lock Control</div>
      <div class="qa">
        <input id="qid"  placeholder="Device ID"/>
        <input id="qmsg" placeholder="Custom lock message (optional)"/>
        <div class="row2">
          <button class="btn br sm" onclick="qLock()">🔒 Lock</button>
          <button class="btn bg sm" onclick="qUnlock()">🔓 Unlock</button>
        </div>
        <div class="row2">
          <button class="btn bsr sm" onclick="lockAll()">LOCK ALL</button>
          <button class="btn bsg sm" onclick="unlockAll()">UNLOCK ALL</button>
        </div>
      </div>
    </div>

    <!-- Shortcuts -->
    <div class="card">
      <div class="ch">// Remote Keys</div>
      <div class="skgrid">
        <button class="btn br sm" onclick="rKey('win')">⊞ Win</button>
        <button class="btn br sm" onclick="rKey('tab','alt')">Alt+Tab</button>
        <button class="btn br sm" onclick="rKey('f4','alt')">Alt+F4</button>
        <button class="btn br sm" onclick="rKey('escape')">Esc</button>
        <button class="btn br sm" onclick="rKey('printscreen')">PrtSc</button>
        <button class="btn br sm" onclick="rKey('home','ctrl')">Ctrl+Home</button>
        <button class="btn bg sm" onclick="rKey('c','ctrl')">Ctrl+C</button>
        <button class="btn bg sm" onclick="rKey('v','ctrl')">Ctrl+V</button>
        <button class="btn bg sm" onclick="rKey('z','ctrl')">Ctrl+Z</button>
        <button class="btn bg sm" onclick="rKey('a','ctrl')">Ctrl+A</button>
        <button class="btn bg sm" onclick="rKey('enter')">Enter</button>
        <button class="btn bg sm" onclick="rKey('space')">Space</button>
      </div>
    </div>

    <!-- Log -->
    <div class="card">
      <div class="ch row">
        <span>// Log</span>
        <button class="btn bg sm" onclick="clearLog()">Clear</button>
      </div>
      <div id="log"></div>
    </div>

  </div>
</div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:            "AIzaSyBcL0G8b7Yt_Ahk29cUaTTfp6Uf4QgNfTI",
  authDomain:        "smsyy-f7bb7.firebaseapp.com",
  databaseURL:       "https://smsyy-f7bb7-default-rtdb.firebaseio.com",
  projectId:         "smsyy-f7bb7",
  storageBucket:     "smsyy-f7bb7.firebasestorage.app",
  messagingSenderId: "199149027655",
  appId:             "1:199149027655:web:2d9e70e7dff7abc293cc62"
});
const db = getDatabase(app);

// ── Firebase connection ────────────────────────────────────
onValue(ref(db,".info/connected"), s=>{
  const ok=s.val();
  document.getElementById("fbb").classList.toggle("live",ok);
  document.getElementById("fbt").textContent = ok?"FIREBASE LIVE":"FIREBASE OFF";
  log(ok?"Firebase connected":"Firebase disconnected", ok?"ok":"er");
});

// ── Devices watch ─────────────────────────────────────────
let devData = {};
onValue(ref(db,"devices"), snap=>{
  devData = snap.val()||{};
  renderDevices(devData);
  const keys=Object.keys(devData);
  document.getElementById("s-tot").textContent = keys.length;
  document.getElementById("s-on").textContent  = keys.filter(k=>devData[k].status==="online").length;
  document.getElementById("s-lk").textContent  = keys.filter(k=>devData[k].overlay_active).length;
});

function renderDevices(data){
  const el=document.getElementById("devlist");
  const keys=Object.keys(data);
  if(!keys.length){
    el.innerHTML=`<div style="padding:18px;text-align:center;color:var(--muted);font-size:.7rem;font-family:'Share Tech Mono'">Koi device nahi</div>`;
    return;
  }
  el.innerHTML=keys.map(id=>{
    const d=data[id], on=d.status==="online", lk=d.overlay_active;
    const active = id===viewingDevice ? "active" : "";
    return `<div class="di ${active}" onclick="window.viewDevice('${id}')">
      <div class="ddot ${on?"on":""}"></div>
      <div class="dinfo">
        <div class="dname">${id}</div>
        <div class="dmeta">${d.screen_w||"?"}×${d.screen_h||"?"}  ${(d.last_seen||"").slice(11,19)}</div>
      </div>
      <span class="dlk ${lk?"lk":"ok"}">${lk?"🔒":"🔓"}</span>
      <div style="display:flex;flex-direction:column;gap:3px;margin-left:5px">
        <button class="btn br sm" onclick="event.stopPropagation();window._lock('${id}')">Lock</button>
        <button class="btn bg sm" onclick="event.stopPropagation();window._unlock('${id}')">Unlock</button>
      </div>
    </div>`;
  }).join("");
}

// ── Screen viewer ─────────────────────────────────────────
let viewingDevice = null;
let screenUnsub   = null;
let fpsCount      = 0;
let fpsTimer      = null;
const scrImg = document.getElementById("scr");
const nomsg  = document.getElementById("nomsg");
const cring  = document.getElementById("cring");
const vbody  = document.getElementById("vbody");
const stBdg  = document.getElementById("stb");
const stTxt  = document.getElementById("stt");

window.viewDevice = id => {
  if(screenUnsub){ screenUnsub(); screenUnsub=null; }
  viewingDevice = id;
  document.getElementById("dev-watching").textContent = `— ${id}`;
  document.getElementById("qid").value = id;

  scrImg.style.display = "block";
  nomsg.style.display  = "none";
  cring.style.display  = "block";
  stBdg.classList.add("live");
  stTxt.textContent = id;

  fpsCount=0;
  clearInterval(fpsTimer);
  fpsTimer = setInterval(()=>{
    const fps=fpsCount; fpsCount=0;
    document.getElementById("fpslbl").textContent = `${fps} fps`;
    document.getElementById("s-fps").textContent  = `${fps}fps`;
    document.getElementById("fpsfill").style.width = Math.min(fps/10*100,100)+"%";
  }, 1000);

  screenUnsub = onValue(ref(db,`screens/${id}`), snap=>{
    const d=snap.val();
    if(!d?.img) return;
    scrImg.src = "data:image/jpeg;base64,"+d.img;
    fpsCount++;
  });

  // highlight active
  renderDevices(devData);
  log(`Viewing: ${id}`, "ok");
  toast(`Screen: ${id}`);
};

// ── Send control to Firebase ──────────────────────────────
function ctrl(payload){
  if(!viewingDevice){ toast("Device select karo pehle!",false,true); return; }
  set(ref(db,`control/${viewingDevice}`),{...payload, ts:Date.now()});
}

// ── Mouse events ──────────────────────────────────────────
let mode     = "move";
let dragging = false;
let lastMove = 0;

function rel(e){
  const r=scrImg.getBoundingClientRect();
  return {
    x: Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)),
    y: Math.max(0,Math.min(1,(e.clientY-r.top)/r.height))
  };
}

scrImg.addEventListener("mousemove", e=>{
  // move cursor ring
  const vr=vbody.getBoundingClientRect();
  cring.style.left=(e.clientX-vr.left)+"px";
  cring.style.top =(e.clientY-vr.top) +"px";
  // throttle 16fps for mouse move commands
  const now=Date.now();
  if(now-lastMove<62) return;
  lastMove=now;
  if(!viewingDevice) return;
  ctrl({type:"mouse_move",...rel(e)});
});

scrImg.addEventListener("click", e=>{
  if(!viewingDevice||mode==="drag") return;
  ctrl({type:"mouse_click",...rel(e),button:"left"});
});

scrImg.addEventListener("contextmenu", e=>{
  e.preventDefault();
  if(!viewingDevice) return;
  ctrl({type:"mouse_click",...rel(e),button:"right"});
});

scrImg.addEventListener("dblclick", e=>{
  if(!viewingDevice) return;
  ctrl({type:"mouse_click",...rel(e),button:"left",double:true});
});

scrImg.addEventListener("mousedown", e=>{
  dragging=true;
  if(mode==="drag"&&viewingDevice) ctrl({type:"mouse_down",...rel(e),button:"left"});
});

scrImg.addEventListener("mouseup", e=>{
  if(dragging&&mode==="drag"&&viewingDevice) ctrl({type:"mouse_up",...rel(e),button:"left"});
  dragging=false;
});

scrImg.addEventListener("wheel", e=>{
  e.preventDefault();
  if(!viewingDevice) return;
  ctrl({type:"mouse_scroll", delta: e.deltaY<0?3:-3});
},{passive:false});

// ── Keyboard ──────────────────────────────────────────────
const skipIds=["kb","qid","qmsg"];
document.addEventListener("keydown", e=>{
  if(skipIds.includes(document.activeElement?.id)) return;
  if(!viewingDevice) return;
  e.preventDefault();
  const key=e.key.toLowerCase()
    .replace("arrowleft","left").replace("arrowright","right")
    .replace("arrowup","up").replace("arrowdown","down")
    .replace(" ","space");
  ctrl({type:"key_press",key,ctrl:e.ctrlKey,alt:e.altKey,shift:e.shiftKey,meta:e.metaKey});
});

document.getElementById("kb").addEventListener("keydown",e=>{
  if(e.key==="Enter"){window.sendText();e.preventDefault();}
});

window.sendText=()=>{
  const t=document.getElementById("kb").value.trim();
  if(!t) return;
  ctrl({type:"type_text",text:t});
  document.getElementById("kb").value="";
  log(`Typed: "${t}"`,"ok");
};

window.rKey=(key,...mods)=>{
  ctrl({type:"key_press",key,ctrl:mods.includes("ctrl"),alt:mods.includes("alt"),shift:mods.includes("shift"),meta:mods.includes("win")});
  log(`Key: ${[...mods,key].join("+")}`.replace(/^[+]/,""),"ok");
};

window.setMode=m=>{
  mode=m;
  ["move","click","drag"].forEach(id=>document.getElementById("mb-"+id)?.classList.toggle("on",id===m));
};

// ── Firebase lock/unlock ───────────────────────────────────
function sendCmd(deviceId,action,message="🔒 Screen Locked",subMsg="Administrator ne lock kiya"){
  set(ref(db,`commands/${deviceId}`),{
    action,message,sub_message:subMsg,
    color:action==="lock"?"#ff4444":"#00ff88",
    timestamp:new Date().toISOString()
  }).then(()=>{ log(`${action} → ${deviceId}`,"ok"); toast(`${action.toUpperCase()} → ${deviceId}`); })
    .catch(e=>{ log("Err: "+e.message,"er"); toast(e.message,false,true); });
}

window._lock   = id=>sendCmd(id,"lock");
window._unlock = id=>sendCmd(id,"unlock");
window.qLock   = ()=>{
  const id=document.getElementById("qid").value.trim(), msg=document.getElementById("qmsg").value.trim();
  if(!id){toast("Device ID daalo!",false,true);return;}
  sendCmd(id,"lock",msg||"🔒 Screen Locked");
};
window.qUnlock = ()=>{
  const id=document.getElementById("qid").value.trim();
  if(!id){toast("Device ID daalo!",false,true);return;}
  sendCmd(id,"unlock");
};
window.lockAll = async()=>{
  const s=await get(ref(db,"devices"));
  Object.keys(s.val()||{}).forEach(id=>sendCmd(id,"lock"));
};
window.unlockAll = async()=>{
  const s=await get(ref(db,"devices"));
  Object.keys(s.val()||{}).forEach(id=>sendCmd(id,"unlock"));
};

// ── Log + Toast ───────────────────────────────────────────
function log(msg,type="in"){
  const b=document.getElementById("log");
  const t=new Date().toLocaleTimeString("en-IN",{hour12:false});
  const el=document.createElement("div");
  el.className="le";
  el.innerHTML=`<span class="lt">${t}</span><span class="lm ${type}">${msg}</span>`;
  b.prepend(el);
  if(b.children.length>80) b.lastChild.remove();
}
window.clearLog=()=>{document.getElementById("log").innerHTML="";};

let _tt;
function toast(msg,good=true,err=false){
  const el=document.getElementById("toast");
  el.textContent=msg;
  el.className="show"+(err?" err":"");
  clearTimeout(_tt);
  _tt=setTimeout(()=>el.classList.remove("show"),2600);
}

log("Admin panel ready — Firebase stream mode","ok");
</script>
