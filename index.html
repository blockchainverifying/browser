<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Overlay Lock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <style>
        /* Overlay Style */
        #lock-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            color: white;
            text-align: center;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            user-select: none;
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen font-sans">

    <!-- Screen Content -->
    <div class="text-center p-8 bg-white rounded-xl shadow-lg max-w-md">
        <h1 class="text-2xl font-bold mb-4 text-gray-800">Welcome to Our Portal</h1>
        <p class="text-gray-600 mb-6">Agar admin overlay activate karega, toh aap keyboard use nahi kar payenge.</p>
        <input type="text" placeholder="Yahan type karne ki koshish karein..." class="border p-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- The Lock Overlay -->
    <div id="lock-overlay">
        <div class="p-10 border-4 border-red-500 rounded-full mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
        </div>
        <h2 class="text-4xl font-black uppercase tracking-widest">System Locked</h2>
        <p class="mt-4 text-xl text-gray-400">Admin ne aapka keyboard input aur screen lock kar diya hai.</p>
    </div>

    <script>
        // Aapka Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBcL0G8b7Yt_Ahk29cUaTTfp6Uf4QgNfTI",
            authDomain: "smsyy-f7bb7.firebaseapp.com",
            databaseURL: "https://smsyy-f7bb7-default-rtdb.firebaseio.com",
            projectId: "smsyy-f7bb7",
            storageBucket: "smsyy-f7bb7.firebasestorage.app",
            messagingSenderId: "199149027655",
            appId: "1:199149027655:web:2d9e70e7dff7abc293cc62"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const overlay = document.getElementById('lock-overlay');
        let isLocked = false;

        // Realtime Database listener
        database.ref('system_settings/overlay_active').on('value', (snapshot) => {
            const active = snapshot.val();
            if (active) {
                activateLock();
            } else {
                deactivateLock();
            }
        });

        function activateLock() {
            isLocked = true;
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Scroll stop karein
        }

        function deactivateLock() {
            isLocked = false;
            overlay.style.display = 'none';
            document.body.style.overflow = 'auto'; // Scroll start karein
        }

        // Keyboard blocking logic
        window.addEventListener('keydown', (e) => {
            if (isLocked) {
                e.preventDefault();
                e.stopPropagation();
                console.log("Input blocked: Key pressed while locked.");
                return false;
            }
        }, true);

        // Right click block karne ke liye (Optional)
        window.addEventListener('contextmenu', (e) => {
            if (isLocked) e.preventDefault();
        });
    </script>
</body>
</html>
